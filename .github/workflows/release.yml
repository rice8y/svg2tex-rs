name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: |
          cargo test --lib --bins --locked

      - name: Build release binary
        run: |
          cargo build --release --locked

      - name: Package release artifacts
        run: |
          mkdir -p dist
          cp target/release/svg2tex dist/svg2tex
          cp README.md LICENSE dist/
          tar -czf svg2tex-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz -C dist svg2tex README.md LICENSE
          sha256sum svg2tex-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz > svg2tex-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            svg2tex-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            svg2tex-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
